<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>店铺信息 - 饭点优选</title>
    <link rel="stylesheet" href="/merchant/css/merchant.css">
</head>
<body>

<header class="merchant-header">
    <div class="header-inner">
        <div class="header-top">
            <div class="header-title">
                <span class="avatar">店</span>
                <div>
                    <h1>店铺信息</h1>
                    <p>维护店铺名称、公告、配送信息和营业状态</p>
                </div>
            </div>

            <button class="logout-btn" onclick="location.href='/merchant/dashboard.html'">返回后台</button>
        </div>

        <section class="hero-panel">
            <div>
                <span class="badge">商家资料</span>
                <h2>让用户看到准确的店铺信息</h2>
                <p>维护店铺名称、地址、公告、配送信息和营业状态</p>
            </div>
            <div class="hero-icon">🏪</div>
        </section>
    </div>
</header>

<main class="merchant-shell">
    <section class="section-card">
        <div class="section-title">
            <div>
                <h2>基础资料</h2>
                <p>店铺名称会同步更新商家账号名称，联系电话会同步更新商家账号手机号。</p>
            </div>
        </div>

        <form id="shopForm" class="shop-form">
            <label>登录账号</label>
            <input id="usernameInput" disabled>

            <label>店铺名称</label>
            <input id="storeNameInput" name="storeName" placeholder="请输入店铺名称">

            <label>联系电话</label>
            <input id="contactPhoneInput" name="contactPhone" placeholder="请输入手机号">

            <label>店铺地址</label>
            <input id="storeAddressInput" name="storeAddress" placeholder="请输入店铺地址">

            <label>店铺Logo地址</label>
            <input id="storeLogoInput" name="storeLogo" placeholder="请输入Logo图片地址，可为空">

            <label>营业状态</label>
            <select id="businessStatusInput" name="businessStatus">
                <option value="1">营业中</option>
                <option value="0">休息中</option>
            </select>

            <label>起送价</label>
            <input id="minOrderAmountInput" name="minOrderAmount" type="number" step="0.01" min="0" placeholder="例如：0.00">

            <label>店铺公告</label>
            <textarea id="storeNoticeInput" name="storeNotice" placeholder="请输入店铺公告"></textarea>

            <div class="shop-readonly-grid">
                <div>
                    <span>店铺评分</span>
                    <b id="ratingText">5.0</b>
                </div>

                <div>
                    <span>月售数量</span>
                    <b id="monthlySalesText">0</b>
                </div>
            </div>

            <button class="ghost-btn main" type="submit">保存店铺信息</button>
        </form>
    </section>
</main>

<style>
    .shop-form {
        display: grid;
        gap: 12px;
        margin-top: 16px;
    }

    .shop-form label {
        font-weight: 800;
        color: #334155;
    }

    .shop-form input,
    .shop-form textarea,
    .shop-form select {
        min-height: 48px;
        padding: 0 14px;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        outline: none;
        background: #f8fafc;
        font: inherit;
    }

    .shop-form textarea {
        min-height: 110px;
        padding-top: 12px;
        resize: vertical;
    }

    .shop-form input:focus,
    .shop-form textarea:focus,
    .shop-form select:focus {
        border-color: #ffd100;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(255, 209, 0, .15);
    }

    .shop-readonly-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .shop-readonly-grid div {
        padding: 14px;
        border-radius: 18px;
        background: #f8fafc;
    }

    .shop-readonly-grid span {
        display: block;
        color: #64748b;
        font-size: 13px;
    }

    .shop-readonly-grid b {
        display: block;
        margin-top: 6px;
        font-size: 22px;
    }

    @media (max-width: 720px) {
        .shop-readonly-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<script src="/merchant/js/merchant-common.js"></script>
<script src="/merchant/js/merchant-shop.js"></script>
</body>
</html>
