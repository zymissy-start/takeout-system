<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商家端 - 外卖点餐系统</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/manage.css">
</head>
<body>
<div id="messageBox" class="message-box"></div>

<header class="manage-header">
    <div class="manage-brand">
        <div class="manage-logo">商</div>
        <div>
            <h1>外卖点餐系统</h1>
            <p>商家端</p>
        </div>
    </div>

    <div class="manage-user">
        <span id="merchantUserInfo">未登录</span>
        <button class="outline-btn" onclick="logout()">退出登录</button>
    </div>
</header>

<main class="manage-layout">
    <aside class="manage-menu">
        <button class="active" data-page="dashboard">经营概览</button>
        <button data-page="products">商品管理</button>
        <button data-page="orders">订单处理</button>
    </aside>

    <section class="manage-content">
        <section id="dashboardPage" class="manage-section active">
            <div class="page-head">
                <div>
                    <h2>经营概览</h2>
                    <p>查看订单数量、营业额、商品数量等数据。</p>
                </div>
                <button class="primary-btn" id="refreshDashboardBtn">刷新</button>
            </div>

            <div id="merchantStats" class="card-grid"></div>
        </section>

        <section id="productsPage" class="manage-section">
            <div class="page-head">
                <div>
                    <h2>商品管理</h2>
                    <p>维护商品名称、价格、分类和上下架状态。</p>
                </div>
            </div>

            <div class="form-panel">
                <h3>新增 / 修改商品</h3>
                <input id="productIdInput" type="hidden">

                <div class="form-grid">
                    <div class="form-item">
                        <label>商品名称</label>
                        <input id="productNameInput" type="text" placeholder="例如 香辣鸡腿堡">
                    </div>

                    <div class="form-item">
                        <label>分类</label>
                        <select id="categorySelect"></select>
                    </div>

                    <div class="form-item">
                        <label>价格</label>
                        <input id="priceInput" type="number" placeholder="例如 18.5">
                    </div>

                    <div class="form-item">
                        <label>图片路径</label>
                        <input id="imageInput" type="text" placeholder="/images/burger1.jpg">
                    </div>
                </div>

                <div class="form-item">
                    <label>商品描述</label>
                    <textarea id="descInput" placeholder="请输入商品描述"></textarea>
                </div>

                <div class="action-row">
                    <button class="primary-btn" id="saveProductBtn">保存商品</button>
                    <button class="outline-btn" id="resetProductBtn">清空表单</button>
                </div>
            </div>

            <div class="table-card">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>商品名称</th>
                        <th>分类</th>
                        <th>价格</th>
                        <th>销量</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="merchantProductTbody"></tbody>
                </table>
            </div>
        </section>

        <section id="ordersPage" class="manage-section">
            <div class="page-head">
                <div>
                    <h2>订单处理</h2>
                    <p>处理顾客订单，完成接单和出餐操作。</p>
                </div>
                <button class="primary-btn" id="refreshOrdersBtn">刷新订单</button>
            </div>

            <div id="merchantOrderList" class="order-card-list"></div>
        </section>
    </section>
</main>

<script src="../js/api.js"></script>
<script src="../js/merchant.js"></script>
</body>
</html>
