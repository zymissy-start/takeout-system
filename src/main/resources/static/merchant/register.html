<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商家注册 - 饭点优选</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                    radial-gradient(circle at 14% 18%, rgba(255, 209, 0, .25), transparent 28%),
                    linear-gradient(135deg, #fffdf5, #f5f7fb);
            color: #111827;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .register-page {
            width: min(980px, calc(100% - 32px));
            margin: 0 auto;
            padding: 42px 0 70px;
        }

        .register-hero {
            padding: 30px;
            border-radius: 34px;
            background:
                    radial-gradient(circle at 88% 12%, rgba(255,255,255,.66) 0, rgba(255,255,255,.66) 92px, transparent 93px),
                    linear-gradient(135deg, #ffe66d, #ffd100);
            box-shadow: 0 24px 60px rgba(15, 23, 42, .12);
        }

        .register-hero span {
            display: inline-flex;
            padding: 7px 13px;
            border-radius: 999px;
            background: rgba(255,255,255,.76);
            color: #3f3000;
            font-weight: 900;
        }

        .register-hero h1 {
            margin: 14px 0 8px;
            font-size: 36px;
        }

        .register-hero p {
            margin: 0;
            color: #5b6472;
            line-height: 1.8;
        }

        .register-card {
            margin-top: 18px;
            padding: 24px;
            border-radius: 30px;
            background: #fff;
            box-shadow: 0 18px 44px rgba(15, 23, 42, .08);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .form-item {
            display: grid;
            gap: 8px;
        }

        .form-item.full {
            grid-column: 1 / -1;
        }

        label {
            color: #334155;
            font-weight: 900;
        }

        input,
        textarea {
            min-height: 48px;
            padding: 0 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            background: #f8fafc;
            font: inherit;
        }

        textarea {
            min-height: 96px;
            padding-top: 12px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: #ffd100;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 209, 0, .15);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .submit-btn {
            min-width: 160px;
            min-height: 48px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, #ffd100, #ffbd00);
            color: #111827;
            font-weight: 900;
            cursor: pointer;
        }

        .link-text {
            color: #64748b;
        }

        .link-text a {
            color: #111827;
            font-weight: 900;
        }

        @media (max-width: 720px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-actions {
                align-items: stretch;
                flex-direction: column;
            }

            .submit-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<main class="register-page">
    <section class="register-hero">
        <span>商家入驻</span>
        <h1>注册商家账号</h1>
        <p>注册成功后，可使用该账号登录商家端，进行商品管理、订单处理和店铺维护。</p>
    </section>

    <section class="register-card">
        <form id="merchantRegisterForm">
            <div class="form-grid">
                <div class="form-item">
                    <label>登录账号</label>
                    <input id="usernameInput" name="username" placeholder="3-20位字母、数字或下划线">
                </div>

                <div class="form-item">
                    <label>联系人姓名</label>
                    <input id="realNameInput" name="realName" placeholder="请输入联系人姓名">
                </div>

                <div class="form-item">
                    <label>登录密码</label>
                    <input id="passwordInput" name="password" type="password" placeholder="6-20位密码">
                </div>

                <div class="form-item">
                    <label>确认密码</label>
                    <input id="confirmPasswordInput" name="confirmPassword" type="password" placeholder="请再次输入密码">
                </div>

                <div class="form-item">
                    <label>手机号</label>
                    <input id="phoneInput" name="phone" placeholder="请输入11位手机号">
                </div>

                <div class="form-item">
                    <label>店铺名称</label>
                    <input id="shopNameInput" name="shopName" placeholder="请输入店铺名称">
                </div>

                <div class="form-item full">
                    <label>店铺地址</label>
                    <input id="shopAddressInput" name="shopAddress" placeholder="请输入店铺地址">
                </div>

                <div class="form-item">
                    <label>营业时间</label>
                    <input id="businessHoursInput" name="businessHours" placeholder="例如：09:00-22:00">
                </div>

                <div class="form-item">
                    <label>配送说明</label>
                    <input id="deliveryDescriptionInput" name="deliveryDescription" placeholder="例如：商家接单后尽快出餐">
                </div>

                <div class="form-item full">
                    <label>店铺公告</label>
                    <textarea id="shopNoticeInput" name="shopNotice" placeholder="请输入店铺公告"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <p class="link-text">
                    已有账号？
                    <a href="/merchant/login.html">去登录</a>
                </p>

                <button class="submit-btn" type="submit">注册商家</button>
            </div>
        </form>
    </section>
</main>

<script src="/merchant/js/merchant-register.js"></script>
</body>
</html>
