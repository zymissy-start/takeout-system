<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 点餐助手</title>
    <link rel="stylesheet" href="/assets/css/user.css">
    <style>
        body {
            background: #f6f7fb;
        }

        .agent-page {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 96px;
            background: #f6f7fb;
        }

        .agent-hero {
            padding: 22px 18px 28px;
            color: #fff;
            background: linear-gradient(135deg, #ff7a45, #ff4d4f);
            border-radius: 0 0 28px 28px;
            box-shadow: 0 14px 34px rgba(255, 77, 79, .22);
        }

        .agent-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .agent-back {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            opacity: .95;
        }

        .agent-title {
            margin: 18px 0 6px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: .5px;
        }

        .agent-subtitle {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            opacity: .94;
        }

        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .18);
            font-size: 12px;
        }

        .agent-section {
            margin: 14px 14px 0;
            padding: 16px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 22px rgba(18, 31, 56, .06);
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .section-head h2 {
            margin: 0;
            font-size: 17px;
            color: #202124;
        }

        .section-tip {
            color: #8a8f99;
            font-size: 12px;
        }

        .quick-prompts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .prompt-btn,
        .agent-btn {
            border: 0;
            border-radius: 13px;
            padding: 12px;
            background: #fff4ee;
            color: #d94b19;
            font-weight: 700;
            cursor: pointer;
        }

        .prompt-btn:hover,
        .agent-btn:hover {
            opacity: .9;
        }

        .agent-btn.primary {
            background: #ff6a2a;
            color: #fff;
            box-shadow: 0 8px 16px rgba(255, 106, 42, .24);
        }

        .agent-btn.ghost {
            background: #f1f3f6;
            color: #4b5563;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .product-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            border: 1px solid #f0f1f4;
            border-radius: 14px;
            background: #fff;
        }

        .product-img-wrap {
            width: 70px;
            height: 70px;
            flex: 0 0 70px;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #fff2cc, #f3f4f6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            display: block;
        }

        .product-img-fallback {
            width: 70px;
            height: 70px;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            display: flex;
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-size: 15px;
            font-weight: 800;
            color: #202124;
            margin-bottom: 4px;
        }

        .product-meta {
            color: #8a8f99;
            font-size: 12px;
            line-height: 1.5;
        }

        .product-price {
            color: #f04b23;
            font-weight: 800;
            margin-top: 6px;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .msg {
            max-width: 86%;
            padding: 11px 13px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .msg.agent {
            background: #fff4ee;
            color: #3f312b;
            border-bottom-left-radius: 5px;
        }

        .msg.user {
            align-self: flex-end;
            background: #ff6a2a;
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .chat-input-bar {
            position: fixed;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: min(520px, 100%);
            display: flex;
            gap: 8px;
            padding: 12px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, .96);
            backdrop-filter: blur(10px);
            border-top: 1px solid #edf0f5;
        }

        .chat-input-bar input {
            flex: 1;
            border: 1px solid #e6e8ee;
            border-radius: 14px;
            padding: 0 13px;
            font-size: 14px;
            outline: none;
        }

        .chat-input-bar input:focus {
            border-color: #ff6a2a;
        }

        .chat-input-bar button {
            width: 72px;
            border: 0;
            border-radius: 14px;
            background: #ff6a2a;
            color: #fff;
            font-weight: 800;
        }

        .empty {
            color: #9aa1ac;
            font-size: 14px;
            padding: 10px 0;
        }

        @media (min-width: 680px) {
            .agent-page {
                margin-top: 20px;
                border-radius: 28px;
                overflow: hidden;
                min-height: calc(100vh - 40px);
            }
        }
    </style>
</head>
<body>
<div class="agent-page">
    <header class="agent-hero">
        <div class="agent-top">
            <a class="agent-back" href="/user/index.html">← 返回首页</a>
            <span>DeepSeek Agent</span>
        </div>
        <h1 class="agent-title">AI 点餐助手</h1>
        <p class="agent-subtitle">
            你可以直接告诉我口味、预算、人数，我会推荐菜品、生成下单方案，并在你确认后帮你完成下单。
        </p>
        <div id="agentStatus" class="agent-status">正在连接助手...</div>
    </header>

    <section class="agent-section">
        <div class="section-head">
            <h2>快捷提问</h2>
            <span class="section-tip">推荐 / 下单 / 联系商家</span>
        </div>
        <div class="quick-prompts">
            <button class="prompt-btn" data-prompt="根据我的点单历史，推荐今天适合吃什么">推荐菜单</button>
            <button class="prompt-btn" data-prompt="两个人40元以内，帮我点一个最划算的">帮我下单</button>
            <button class="prompt-btn" data-prompt="帮我联系商家催一下订单">联系商家</button>
            <button class="prompt-btn" data-prompt="我想吃辣一点，帮我推荐合适的菜品">口味推荐</button>
        </div>
    </section>

    <section class="agent-section">
        <div class="section-head">
            <h2>推荐菜品</h2>
            <span class="section-tip">历史 + 热卖</span>
        </div>
        <div id="recommendList" class="product-grid">
            <div class="empty">加载中...</div>
        </div>
    </section>

    <section class="agent-section">
        <div class="section-head">
            <h2>对话推荐</h2>
            <span class="section-tip">可输入口味、预算、人数</span>
        </div>
        <div id="chatPanel" class="chat-panel"></div>
        <div style="margin-top: 12px; text-align: right;">
            <button id="confirmOrderBtn" class="agent-btn primary" style="display:none;">确认下单</button>
        </div>
    </section>
</div>

<div class="chat-input-bar">
    <input id="chatInput" placeholder="例如：两个人40元以内，帮我点一个最划算的">
    <button id="sendBtn">发送</button>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/assets/js/request.js"></script>
<script src="/assets/js/cart.js"></script>
<script src="/assets/js/ai-agent.js"></script>
</body>
</html>
