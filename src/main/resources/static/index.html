<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>身份选择 - 饭点优选</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                    radial-gradient(circle at 15% 20%, rgba(255, 209, 0, 0.25), transparent 28%),
                    radial-gradient(circle at 85% 18%, rgba(47, 128, 237, 0.18), transparent 30%),
                    linear-gradient(135deg, #fffdf5, #f5f7fb);
            color: #111827;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .role-page {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 54px 0 70px;
        }

        .role-hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 24px;
            align-items: center;
            padding: 34px;
            border-radius: 36px;
            background:
                    radial-gradient(circle at 86% 15%, rgba(255, 255, 255, .72) 0, rgba(255, 255, 255, .72) 105px, transparent 106px),
                    linear-gradient(135deg, #ffe66d, #ffd100);
            box-shadow: 0 24px 60px rgba(15, 23, 42, .12);
        }

        .role-badge {
            display: inline-flex;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .75);
            color: #3f3000;
            font-size: 14px;
            font-weight: 900;
        }

        .role-hero h1 {
            margin: 18px 0 12px;
            font-size: 44px;
            line-height: 1.12;
        }

        .role-hero p {
            margin: 0;
            max-width: 650px;
            color: #5b6472;
            font-size: 17px;
            line-height: 1.8;
        }

        .role-hero-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 210px;
            border-radius: 34px;
            background: rgba(255, 255, 255, .42);
            font-size: 96px;
        }

        .role-card-panel {
            margin-top: 22px;
            padding: 24px;
            border-radius: 34px;
            background: rgba(255, 255, 255, .86);
            box-shadow: 0 18px 44px rgba(15, 23, 42, .08);
            backdrop-filter: blur(10px);
        }

        .role-section-title {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 18px;
        }

        .role-section-title h2 {
            margin: 0;
            font-size: 28px;
        }

        .role-section-title p {
            margin: 6px 0 0;
            color: #64748b;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .role-card {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 300px;
            padding: 24px;
            border-radius: 30px;
            background: #f8fafc;
            border: 1px solid #edf0f5;
            overflow: hidden;
            transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
        }

        .role-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 209, 0, .8);
            box-shadow: 0 18px 36px rgba(15, 23, 42, .13);
        }

        .role-icon {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 26px;
            font-size: 34px;
            box-shadow: 0 12px 26px rgba(15, 23, 42, .10);
        }

        .role-icon.user {
            background: linear-gradient(135deg, #c9f3ff, #2f80ed);
        }

        .role-icon.merchant {
            background: linear-gradient(135deg, #fff1a8, #ffd100);
        }

        .role-icon.rider {
            background: linear-gradient(135deg, #b7f7ef, #13c2a3);
        }

        .role-card h3 {
            margin: 22px 0 10px;
            font-size: 24px;
        }

        .role-card p {
            margin: 0;
            color: #64748b;
            line-height: 1.7;
        }

        .role-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: auto;
            padding-top: 22px;
        }

        .role-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            border-radius: 999px;
            font-weight: 900;
            transition: transform .16s ease, box-shadow .16s ease;
        }

        .role-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(15, 23, 42, .12);
        }

        .role-btn.login {
            background: #111827;
            color: #fff;
        }

        .role-btn.register {
            background: linear-gradient(135deg, #ffd100, #ffbd00);
            color: #111827;
        }

        .role-btn.rider-register {
            background: linear-gradient(135deg, #13c2a3, #0f9f88);
            color: #fff;
        }

        .role-footer {
            margin-top: 18px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }

        @media (max-width: 860px) {
            .role-hero {
                grid-template-columns: 1fr;
            }

            .role-grid {
                grid-template-columns: 1fr;
            }

            .role-hero h1 {
                font-size: 34px;
            }

            .role-hero-icon {
                min-height: 150px;
                font-size: 70px;
            }
        }
    </style>
</head>
<body>

<main class="role-page">
    <section class="role-hero">
        <div>
            <span class="role-badge">饭点优选统一入口</span>
            <h1>请选择你的身份</h1>
            <p>
                用户、商家、骑手分别进入不同的登录和注册页面。
                请根据你的身份选择对应入口。
            </p>
        </div>

        <div class="role-hero-icon">🍱</div>
    </section>

    <section class="role-card-panel">
        <div class="role-section-title">
            <div>
                <h2>身份选择</h2>
                <p>请选择登录或注册入口。</p>
            </div>
        </div>

        <div class="role-grid">
            <article class="role-card">
                <div class="role-icon user">👤</div>
                <h3>用户</h3>
                <p>用户端用于浏览商品、提交订单、查看订单状态。</p>

                <div class="role-actions">
                    <a class="role-btn login" href="/login.html">用户登录</a>
                    <a class="role-btn register" href="/register.html">用户注册</a>
                </div>
            </article>

            <article class="role-card">
                <div class="role-icon merchant">🏪</div>
                <h3>商家</h3>
                <p>商家端用于商品管理、订单处理、店铺信息维护。</p>

                <div class="role-actions">
                    <a class="role-btn login" href="/merchant/login.html">商家登录</a>
                    <a class="role-btn register" href="/merchant/register.html">商家注册</a>
                </div>
            </article>

            <article class="role-card">
                <div class="role-icon rider">🛵</div>
                <h3>骑手</h3>
                <p>骑手端用于查看配送订单、接单、更新配送状态。</p>

                <div class="role-actions">
                    <a class="role-btn login" href="/rider/login.html">骑手登录</a>
                    <a class="role-btn rider-register" href="/rider/register.html">骑手注册</a>
                </div>
            </article>
        </div>
    </section>

    <p class="role-footer">
        饭点优选外卖点餐系统 · 统一身份入口
    </p>
</main>

</body>
</html>
