<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>外卖点餐系统 - 登录</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div id="messageBox" class="message-box"></div>

<div class="login-page">
    <div class="login-left">
        <div class="brand">
            <div class="brand-logo">食</div>
            <div>
                <h1>外卖点餐系统</h1>
                <p>Food Delivery Ordering System</p>
            </div>
        </div>

        <div class="intro-card">
            <h2>顾客端功能</h2>
            <p>浏览商品、分类筛选、加入点餐车、提交订单、查看订单状态。</p>
            <ul>
                <li>数据来自 MySQL 商品表</li>
                <li>Ajax 异步请求后端接口</li>
                <li>订单数据写入订单表和订单明细表</li>
            </ul>
        </div>
    </div>

    <div class="login-panel">
        <h2>用户登录</h2>
        <p class="sub-title">请使用普通用户账号进入顾客端</p>

        <form id="loginForm">
            <div class="form-item">
                <label>账号</label>
                <input id="username" type="text" placeholder="请输入账号，例如 zhangsan">
            </div>

            <div class="form-item">
                <label>密码</label>
                <input id="password" type="password" placeholder="请输入密码，例如 123456">
            </div>

            <button type="submit" class="primary-btn full-btn">登录</button>
        </form>

        <div class="login-tip">
            测试账号：<strong>zhangsan / 123456</strong>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
