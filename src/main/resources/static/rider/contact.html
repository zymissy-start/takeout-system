<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系消息 - 骑手端</title>
  <link rel="stylesheet" href="/rider/css/rider-app.css" />
  <style>
    .contact-shell { padding: 14px; }
    .session-list { display: grid; gap: 10px; max-height: 340px; overflow: auto; }
    .session-card {
      width: 100%; display: block; text-align: left; border: 1px solid var(--mt-line);
      background: var(--mt-card); border-radius: 16px; padding: 14px; cursor: pointer;
      transition: border-color .16s, box-shadow .16s;
    }
    .session-card:hover { border-color: var(--mt-yellow); }
    .session-card.active { border-color: var(--mt-black); box-shadow: 0 8px 20px rgba(15,23,42,.10); }
    .session-card-title { display: flex; justify-content: space-between; gap: 10px; font-weight: 800; line-height: 1.45; }
    .session-title-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-meta { margin-top: 8px; color: var(--mt-sub); font-size: 13px; line-height: 1.7; }
    .role-tag { display: inline-flex; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 800; }
    .role-1 { background: #dbeafe; color: #1d4ed8; }
    .role-2 { background: #fef3c7; color: #92400e; }
    .role-3 { background: #dcfce7; color: #15803d; }
    .role-4 { background: #e5e7eb; color: #374151; }
    .status-chip { display: inline-flex; padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 800; }
    .status-0 { background: #fff7cc; color: #765800; }
    .status-1 { background: #dbeafe; color: #1d4ed8; }
    .status-2 { background: #e5e7eb; color: #4b5563; }
    .message-box { min-height: 260px; max-height: 360px; overflow: auto; display: grid; gap: 12px; align-content: start; background: #f8fafc; border-radius: 14px; padding: 14px; margin-top: 12px; }
    .message-row { display: flex; }
    .message-row.mine { justify-content: flex-end; }
    .bubble { max-width: 78%; padding: 10px 13px; border-radius: 16px 16px 16px 6px; background: var(--mt-card); box-shadow: 0 4px 12px rgba(15,23,42,.06); line-height: 1.65; word-break: break-word; }
    .message-row.mine .bubble { border-radius: 16px 16px 6px 16px; background: var(--mt-yellow); }
    .bubble-meta { font-size: 12px; color: var(--mt-sub); margin-bottom: 4px; }
    .reply-row { display: flex; gap: 10px; margin-top: 12px; }
    .reply-row input { flex: 1; height: 42px; padding: 0 12px; border: 1px solid var(--mt-line); border-radius: 14px; outline: none; background: var(--mt-card); }
    .reply-row input:focus { border-color: var(--mt-yellow); }
    .reply-row button { height: 42px; padding: 0 18px; border: none; border-radius: 14px; background: var(--mt-black); color: #fff; font-weight: 800; cursor: pointer; }
    .reply-row button:disabled { opacity: .5; cursor: not-allowed; }
    .empty-tip { padding: 28px 16px; text-align: center; color: var(--mt-sub); }
    .mt-card-title { font-size: 16px; font-weight: 800; margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; }
    .mt-card-title button { font-size: 13px; padding: 6px 14px; border: 1px solid var(--mt-yellow); background: var(--mt-yellow); color: var(--mt-black); border-radius: 10px; font-weight: 800; cursor: pointer; }
    .create-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 20; display: flex; align-items: flex-end; justify-content: center; }
    .create-sheet { width: 100%; max-width: 760px; background: var(--mt-card); border-radius: 22px 22px 0 0; padding: 24px; max-height: 80vh; overflow: auto; }
    .create-sheet h3 { margin: 0 0 16px; font-size: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--mt-sub); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; height: 42px; padding: 0 12px; border: 1px solid var(--mt-line); border-radius: 14px; outline: none; background: var(--mt-card);
    }
    .form-group textarea { height: 80px; padding: 10px 12px; resize: vertical; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--mt-yellow); }
    .create-actions { display: flex; gap: 10px; margin-top: 16px; }
    .create-actions button { flex: 1; height: 44px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; }
  </style>
</head>
<body class="mt-body">
  <div class="mt-shell">
    <header class="mt-module-header">
      <div class="mt-module-top">
        <a href="/rider/dashboard.html" class="mt-back">‹</a>
        <h2 class="mt-module-title">联系消息</h2>
        <span></span>
      </div>
    </header>

    <main class="mt-module-main contact-shell">
      <div class="mt-card">
        <div class="mt-card-title">
          会话列表
          <button id="createBtn" type="button">+ 新发起</button>
        </div>
        <div id="sessionList" class="session-list">
          <div class="empty-tip">加载中...</div>
        </div>
      </div>

      <div id="detailCard" class="mt-card" style="margin-top:14px;display:none;">
        <div class="mt-card-title">
          <span id="detailTitle">消息对话</span>
          <button id="closeSessionBtn" type="button" style="background:none;border:1px solid var(--mt-red);color:var(--mt-red);display:none;">关闭会话</button>
        </div>
        <p id="detailSub" style="margin:0 0 4px;color:var(--mt-sub);font-size:13px;">选择左侧会话后查看消息</p>
        <div id="messageBox" class="message-box">
          <div class="empty-tip">请选择一个会话</div>
        </div>
        <div class="reply-row">
          <input id="replyInput" placeholder="输入回复内容..." maxlength="2000" />
          <button id="sendReplyBtn" type="button">发送</button>
        </div>
      </div>
    </main>

    <nav class="mt-bottom">
      <a href="/rider/dashboard.html">首页</a>
      <a href="/rider/recommend.html">推荐</a>
      <a href="/rider/current.html">配送</a>
      <a href="/rider/contact.html" class="active">消息</a>
    </nav>
  </div>

  <div id="createOverlay" class="create-overlay" style="display:none;">
    <div class="create-sheet">
      <h3>发起新会话</h3>
      <div class="form-group">
        <label>目标角色</label>
        <select id="createFormRole">
          <option value="1">用户</option>
          <option value="2">商家</option>
        </select>
      </div>
      <div class="form-group">
        <label>目标用户 ID</label>
        <input id="createFormTargetId" type="number" placeholder="输入对方的用户ID" />
      </div>
      <div class="form-group">
        <label>关联订单 ID（可选）</label>
        <input id="createFormOrderId" type="number" placeholder="可选" />
      </div>
      <div class="form-group">
        <label>标题</label>
        <input id="createFormTitle" placeholder="如：配送问题咨询" />
      </div>
      <div class="form-group">
        <label>首条消息</label>
        <textarea id="createFormContent" placeholder="输入要发送的第一条消息"></textarea>
      </div>
      <div class="create-actions">
        <button id="createCancelBtn" type="button" style="background:var(--mt-line);color:var(--mt-black);">取消</button>
        <button id="createSubmitBtn" type="button" style="background:var(--mt-yellow);color:var(--mt-black);">发起会话</button>
      </div>
    </div>
  </div>

  <nav class="mt-bottom">
      <a href="/rider/dashboard.html"><span>🏠</span>首页</a>
      <a href="/rider/recommend.html"><span>📍</span>推荐</a>
      <a href="/rider/current.html"><span>🛵</span>配送</a>
      <a class="active" href="/rider/contact.html"><span>💬</span>消息</a>
  </nav>

  <div id="riderToast" class="rider-toast hidden"></div>

  <script src="/rider/js/rider-common.js"></script>
  <script>
    (function () {
      const $ = RiderApp.$;
      let sessions = [];
      let currentSessionId = null;
      const roleNames = { 1: '用户', 2: '商家', 3: '骑手', 4: '管理员' };
      const statusText = ['待回复', '对话中', '已关闭'];

      function esc(v) { return RiderApp.escapeHtml(v); }
      function fmtTime(v) { return v ? String(v).replace('T', ' ').slice(0, 16) : ''; }

      function roleTag(role) {
        const r = Number(role);
        return `<span class="role-tag role-${r}">${roleNames[r] || '未知'}</span>`;
      }
      function statusChip(status) {
        const s = Number(status || 0);
        return `<span class="status-chip status-${s}">${statusText[s] || '未知'}</span>`;
      }

      async function loadSessions() {
        try {
          sessions = await RiderApp.request('/rider/contact/sessions');
          sessions = Array.isArray(sessions) ? sessions : [];
          renderSessions();
        } catch (e) {
          $('#sessionList').innerHTML = `<div class="empty-tip">${esc(e.message || '加载失败')}</div>`;
        }
      }

      function renderSessions() {
        const box = $('#sessionList');
        if (!sessions.length) { box.innerHTML = '<div class="empty-tip">暂无会话</div>'; return; }
        box.innerHTML = sessions.map(s => {
          const ir = Number(s.initiatorRole);
          const tr = Number(s.targetRole);
          const partnerRole = ir === 3 ? tr : ir;
          const partnerName = ir === 3 ? (s.targetName || ('#' + s.targetId)) : (s.initiatorName || ('#' + s.initiatorId));
          return `
            <button class="session-card ${s.sessionId === currentSessionId ? 'active' : ''}" data-sid="${s.sessionId}">
              <div class="session-card-title">
                <span class="session-title-text">${esc(s.title || '无标题')}</span>
                ${statusChip(s.status)}
              </div>
              <div class="session-meta">
                ${roleTag(partnerRole)} ${esc(partnerName)}<br>
                ${fmtTime(s.updateTime)} · ${esc(s.lastMessage || '暂无消息')}
              </div>
            </button>`;
        }).join('');
        box.querySelectorAll('.session-card').forEach(btn => {
          btn.addEventListener('click', () => openSession(Number(btn.dataset.sid)));
        });
      }

      async function openSession(sid) {
        currentSessionId = sid;
        renderSessions();
        $('#detailCard').style.display = '';
        try {
          const detail = await RiderApp.request(`/rider/contact/sessions/${sid}`);
          const session = detail.session || {};
          const messages = detail.messages || [];
          const ir = Number(session.initiatorRole);
          const partnerRole = ir === 3 ? Number(session.targetRole) : ir;
          const partnerName = ir === 3 ? (session.targetName || '') : (session.initiatorName || '');
          $('#detailTitle').textContent = session.title || '消息对话';
          $('#detailSub').innerHTML = `${roleTag(partnerRole)} ${esc(partnerName)} ${statusChip(session.status)}`;
          $('#closeSessionBtn').style.display = Number(session.status) === 2 ? 'none' : '';
          $('#replyInput').disabled = Number(session.status) === 2;
          $('#sendReplyBtn').disabled = Number(session.status) === 2;
          $('#messageBox').innerHTML = messages.length ? messages.map(m => {
            const mine = Number(m.senderRole) === 3;
            return `<div class="message-row ${mine ? 'mine' : ''}"><div class="bubble"><div class="bubble-meta">${mine ? '我（骑手）' : esc(m.senderName || roleNames[partnerRole] || '对方')} · ${fmtTime(m.createTime)}</div>${esc(m.content)}</div></div>`;
          }).join('') : '<div class="empty-tip">暂无消息</div>';
          $('#messageBox').scrollTop = $('#messageBox').scrollHeight;
        } catch (e) { RiderApp.toast(e.message || '加载失败'); }
      }

      async function sendReply() {
        if (!currentSessionId) return RiderApp.toast('请先选择会话');
        const content = $('#replyInput').value.trim();
        if (!content) return RiderApp.toast('请输入回复内容');
        try {
          await RiderApp.request(`/rider/contact/sessions/${currentSessionId}/messages`, { method: 'POST', body: { content } });
          $('#replyInput').value = '';
          RiderApp.toast('发送成功', 'success');
          await openSession(currentSessionId);
          await loadSessions();
        } catch (e) { RiderApp.toast(e.message || '发送失败'); }
      }

      async function closeSession() {
        if (!currentSessionId) return;
        if (!confirm('确认关闭此会话？')) return;
        try {
          await RiderApp.request(`/rider/contact/sessions/${currentSessionId}/close`, { method: 'PUT' });
          RiderApp.toast('会话已关闭', 'success');
          await openSession(currentSessionId);
          await loadSessions();
        } catch (e) { RiderApp.toast(e.message || '关闭失败'); }
      }

      async function submitCreate() {
        const targetId = $('#createFormTargetId').value.trim();
        const targetRole = $('#createFormRole').value;
        const orderId = $('#createFormOrderId').value.trim();
        const title = $('#createFormTitle').value.trim();
        const content = $('#createFormContent').value.trim();
        if (!targetId) return RiderApp.toast('请输入目标用户ID');
        if (!content) return RiderApp.toast('请输入首条消息');
        const body = { targetId: Number(targetId), targetRole: Number(targetRole), content };
        if (orderId) body.orderId = Number(orderId);
        if (title) body.title = title;
        try {
          const session = await RiderApp.request('/rider/contact/sessions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          RiderApp.toast('会话已创建', 'success');
          $('#createOverlay').style.display = 'none';
          await loadSessions();
          if (session && session.sessionId) await openSession(session.sessionId);
        } catch (e) { RiderApp.toast(e.message || '创建失败'); }
      }

      $('#sendReplyBtn').addEventListener('click', sendReply);
      $('#closeSessionBtn').addEventListener('click', closeSession);
      $('#replyInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendReply(); });
      $('#createBtn').addEventListener('click', () => { $('#createOverlay').style.display = 'flex'; });
      $('#createCancelBtn').addEventListener('click', () => { $('#createOverlay').style.display = 'none'; });
      $('#createSubmitBtn').addEventListener('click', submitCreate);
      $('#createOverlay').addEventListener('click', e => { if (e.target === $('#createOverlay')) $('#createOverlay').style.display = 'none'; });

      RiderApp.requireRiderLogin().then(loadSessions);
    })();
  </script>
</body>
</html>
