<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>骑手端 - 外卖点餐系统</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/manage.css">
</head>
<body>
<div id="messageBox" class="message-box"></div>

<header class="manage-header">
    <div class="manage-brand">
        <div class="manage-logo">骑</div>
        <div>
            <h1>外卖点餐系统</h1>
            <p>骑手端</p>
        </div>
    </div>

    <div class="manage-user">
        <span id="riderUserInfo">未登录</span>
        <button class="outline-btn" onclick="logout()">退出登录</button>
    </div>
</header>

<main class="manage-layout">
    <aside class="manage-menu">
        <button class="active" data-page="available">可接订单</button>
        <button data-page="mine">我的配送</button>
    </aside>

    <section class="manage-content">
        <section id="availablePage" class="manage-section active">
            <div class="page-head">
                <div>
                    <h2>可接订单</h2>
                    <p>商家已出餐的订单会显示在这里。</p>
                </div>
                <button class="primary-btn" id="refreshAvailableBtn">刷新</button>
            </div>

            <div id="availableOrderList" class="order-card-list"></div>
        </section>

        <section id="minePage" class="manage-section">
            <div class="page-head">
                <div>
                    <h2>我的配送</h2>
                    <p>查看当前配送中和已完成的订单。</p>
                </div>
                <button class="primary-btn" id="refreshMineBtn">刷新</button>
            </div>

            <div id="myOrderList" class="order-card-list"></div>
        </section>
    </section>
</main>

<script src="../js/api.js"></script>
<script src="../js/rider.js"></script>
</body>
</html>
