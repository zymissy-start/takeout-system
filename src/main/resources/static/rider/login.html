<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>骑手登录 - 饭点优选骑手端</title>
    <style>
        :root {
            --mt-yellow: #ffd100;
            --mt-yellow-dark: #ffbd00;
            --mt-black: #111827;
            --mt-sub: #64748b;
            --mt-bg: #f3f4f8;
            --mt-card: #ffffff;
            --mt-green: #13c2a3;
            --mt-blue: #2f80ed;
            --mt-orange: #ff8a00;
            --mt-red: #ef4444;
            --mt-line: #edf0f5;
            --mt-shadow: 0 18px 46px rgba(17, 24, 39, .12);
            --mt-strong-shadow: 0 28px 80px rgba(17, 24, 39, .20);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--mt-black);
            background:
                    radial-gradient(circle at 16% 12%, rgba(255, 209, 0, .22) 0, rgba(255, 209, 0, .22) 130px, transparent 132px),
                    radial-gradient(circle at 88% 18%, rgba(19, 194, 163, .16) 0, rgba(19, 194, 163, .16) 150px, transparent 152px),
                    #eef1f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .phone-shell {
            width: min(760px, calc(100% - 28px));
            min-height: 100vh;
            margin: 0 auto;
            background: var(--mt-bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(15, 23, 42, .05);
        }

        @media (min-width: 900px) {
            .phone-shell {
                margin-top: 18px;
                margin-bottom: 18px;
                min-height: calc(100vh - 36px);
                border-radius: 38px;
            }
        }

        .hero {
            position: relative;
            padding: 28px 26px 118px;
            background:
                    radial-gradient(circle at 84% 8%, rgba(255,255,255,.56) 0, rgba(255,255,255,.56) 120px, transparent 122px),
                    linear-gradient(135deg, #ffe66d 0%, #ffd100 52%, #ffbd00 100%);
            border-bottom-left-radius: 38px;
            border-bottom-right-radius: 38px;
        }

        .hero-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            width: 58px;
            height: 58px;
            border-radius: 22px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            box-shadow: 0 12px 26px rgba(129, 91, 0, .14);
        }

        .brand h1 {
            margin: 0;
            font-size: 27px;
            line-height: 1.1;
            letter-spacing: -.5px;
        }

        .brand p {
            margin: 6px 0 0;
            color: rgba(17, 24, 39, .68);
            font-weight: 700;
        }

        .demo-pill {
            padding: 10px 14px;
            border-radius: 999px;
            color: #fff;
            background: #111827;
            font-size: 13px;
            font-weight: 900;
            box-shadow: 0 10px 24px rgba(17, 24, 39, .22);
        }

        .hero-card {
            position: absolute;
            left: 26px;
            right: 26px;
            bottom: -82px;
            padding: 24px;
            border-radius: 32px;
            color: #fff;
            background:
                    radial-gradient(circle at 88% 18%, rgba(255, 209, 0, .25) 0, rgba(255, 209, 0, .25) 92px, transparent 94px),
                    linear-gradient(135deg, #14181f 0%, #263238 100%);
            box-shadow: var(--mt-strong-shadow);
            overflow: hidden;
        }

        .hero-badge {
            display: inline-flex;
            padding: 7px 13px;
            border-radius: 999px;
            color: #3f3000;
            background: var(--mt-yellow);
            font-size: 13px;
            font-weight: 900;
        }

        .hero-card h2 {
            margin: 24px 0 10px;
            font-size: clamp(32px, 5vw, 46px);
            line-height: 1.08;
            letter-spacing: -1px;
        }

        .hero-card p {
            max-width: 560px;
            margin: 0;
            color: rgba(255,255,255,.74);
            line-height: 1.7;
            font-size: 15px;
        }

        .content {
            padding: 108px 22px 40px;
        }

        .feature-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .feature-item {
            min-height: 96px;
            padding: 14px 12px;
            border-radius: 24px;
            background: #fff;
            box-shadow: 0 10px 28px rgba(17, 24, 39, .07);
        }

        .feature-item span {
            display: block;
            font-size: 28px;
        }

        .feature-item b {
            display: block;
            margin-top: 9px;
            font-size: 15px;
        }

        .feature-item p {
            margin: 5px 0 0;
            color: var(--mt-sub);
            font-size: 12px;
        }

        .login-card {
            padding: 24px;
            border-radius: 34px;
            background: #fff;
            box-shadow: var(--mt-shadow);
        }

        .login-title {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 20px;
        }

        .login-title h3 {
            margin: 0;
            font-size: 25px;
        }

        .login-title p {
            margin: 7px 0 0;
            color: var(--mt-sub);
            line-height: 1.6;
        }

        .login-title span {
            flex: 0 0 auto;
            padding: 8px 12px;
            border-radius: 999px;
            color: #3f3000;
            background: #fff7cc;
            font-size: 13px;
            font-weight: 900;
        }

        .form-group {
            margin-top: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
            font-weight: 900;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            min-height: 54px;
            border-radius: 20px;
            background: #f8fafc;
            border: 1px solid var(--mt-line);
        }

        .input-wrap:focus-within {
            border-color: var(--mt-yellow-dark);
            box-shadow: 0 0 0 4px rgba(255, 209, 0, .16);
            background: #fff;
        }

        .input-wrap i {
            font-style: normal;
            font-size: 20px;
        }

        .input-wrap input {
            flex: 1;
            min-width: 0;
            border: 0;
            outline: none;
            background: transparent;
            color: var(--mt-black);
            font-size: 16px;
            font-weight: 700;
        }

        .password-btn {
            border: 0;
            padding: 7px 10px;
            border-radius: 999px;
            background: #eef2f7;
            color: #334155;
            font-size: 13px;
            font-weight: 900;
        }

        .login-btn {
            width: 100%;
            margin-top: 22px;
            border: 0;
            min-height: 56px;
            border-radius: 22px;
            color: #111827;
            background: linear-gradient(135deg, #ffd100, #ffbd00);
            font-size: 17px;
            font-weight: 900;
            box-shadow: 0 14px 28px rgba(255, 189, 0, .24);
        }

        .login-btn:disabled {
            opacity: .65;
            cursor: not-allowed;
        }

        .message {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 18px;
            background: #f8fafc;
            color: var(--mt-sub);
            font-size: 14px;
            line-height: 1.5;
        }

        .message.hidden {
            display: none;
        }

        .message[data-type="success"] {
            background: #ecfdf5;
            color: #047857;
        }

        .message[data-type="error"] {
            background: #fef2f2;
            color: #b91c1c;
        }

        .demo-account {
            margin-top: 16px;
            padding: 16px;
            border-radius: 24px;
            background:
                    linear-gradient(#fff, #fff) padding-box,
                    linear-gradient(135deg, var(--mt-yellow), var(--mt-green)) border-box;
            border: 1px solid transparent;
        }

        .demo-account p {
            margin: 0;
            color: var(--mt-sub);
            font-size: 14px;
        }

        .demo-account b {
            color: var(--mt-black);
            font-size: 18px;
        }

        .module-preview {
            margin-top: 16px;
            padding: 20px;
            border-radius: 30px;
            background: #fff;
            box-shadow: 0 10px 28px rgba(17, 24, 39, .07);
        }

        .module-preview h3 {
            margin: 0 0 14px;
            font-size: 20px;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .module-item {
            display: grid;
            justify-items: center;
            gap: 8px;
            text-align: center;
            color: #111827;
        }

        .module-icon {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-size: 25px;
            box-shadow: 0 10px 22px rgba(17, 24, 39, .08);
        }

        .module-item span:last-child {
            font-size: 12px;
            font-weight: 900;
        }

        .icon-yellow {
            background: linear-gradient(135deg, #fff1a8, #ffd100);
        }

        .icon-green {
            background: linear-gradient(135deg, #b7f7ef, #13c2a3);
        }

        .icon-orange {
            background: linear-gradient(135deg, #ffd6a5, #ff8a00);
        }

        .icon-blue {
            background: linear-gradient(135deg, #c9f3ff, #2f80ed);
        }

        @media (max-width: 640px) {
            .phone-shell {
                width: 100%;
            }

            .hero {
                border-bottom-left-radius: 30px;
                border-bottom-right-radius: 30px;
            }

            .feature-strip {
                grid-template-columns: 1fr;
            }

            .module-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .module-icon {
                width: 48px;
                height: 48px;
            }

            .module-item span:last-child {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div class="phone-shell">
    <header class="hero">
        <div class="hero-top">
            <div class="brand">
                <div class="brand-logo">骑</div>
                <div>
                    <h1>饭点优选骑手端</h1>
                    <p>Rider Delivery App</p>
                </div>
            </div>

            <div class="demo-pill">演示系统</div>
        </div>

        <section class="hero-card">
            <span class="hero-badge">智能配送</span>
            <h2>快速接单，准时送达</h2>
            <p>
                支持智能推荐、当前配送、骑手成长、位置中心、打赏订单和催促商家出餐。
            </p>
        </section>
    </header>

    <main class="content">
        <section class="feature-strip">
            <article class="feature-item">
                <span>📍</span>
                <b>最近订单推荐</b>
                <p>按骑手、商家、用户距离排序</p>
            </article>

            <article class="feature-item">
                <span>⚡</span>
                <b>等级成长</b>
                <p>5 单闪电侠，10 单单王</p>
            </article>

            <article class="feature-item">
                <span>🛵</span>
                <b>状态联动</b>
                <p>接单、配送、完成自动变化</p>
            </article>
        </section>

        <section class="login-card">
            <div class="login-title">
                <div>
                    <h3>骑手账号登录</h3>
                    <p>登录后进入骑手首页，处理配送任务。</p>
                </div>
                <span>骑手入口</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="usernameInput">账号</label>
                    <div class="input-wrap">
                        <i>👤</i>
                        <input id="usernameInput" name="username" value="rider_knight" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="passwordInput">密码</label>
                    <div class="input-wrap">
                        <i>🔒</i>
                        <input id="passwordInput" name="password" type="password" value="123456" autocomplete="current-password">
                        <button id="togglePasswordBtn" class="password-btn" type="button">显示</button>
                    </div>
                </div>

                <button id="loginSubmitBtn" class="login-btn" type="submit">
                    进入骑手工作台
                </button>

                <div id="authMessage" class="message hidden"></div>
            </form>

            <div class="demo-account">
                <p>演示账号：</p>
                <b>rider_knight / 123456</b>
            </div>
        </section>

        <section class="module-preview">
            <h3>登录后可使用模块</h3>

            <div class="module-grid">
                <div class="module-item">
                    <span class="module-icon icon-yellow">📍</span>
                    <span>智能推荐</span>
                </div>

                <div class="module-item">
                    <span class="module-icon icon-green">🛵</span>
                    <span>当前配送</span>
                </div>

                <div class="module-item">
                    <span class="module-icon icon-orange">🎁</span>
                    <span>打赏订单</span>
                </div>

                <div class="module-item">
                    <span class="module-icon icon-blue">🧭</span>
                    <span>位置中心</span>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    const loginForm = document.querySelector('#loginForm');
    const usernameInput = document.querySelector('#usernameInput');
    const passwordInput = document.querySelector('#passwordInput');
    const loginSubmitBtn = document.querySelector('#loginSubmitBtn');
    const authMessage = document.querySelector('#authMessage');
    const togglePasswordBtn = document.querySelector('#togglePasswordBtn');

    togglePasswordBtn.addEventListener('click', function () {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        togglePasswordBtn.textContent = isPassword ? '隐藏' : '显示';
    });

    loginForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!username || !password) {
            setMessage('请填写账号和密码', 'error');
            return;
        }

        try {
            loginSubmitBtn.disabled = true;
            setMessage('正在登录，请稍候...', 'info');

            const response = await fetch('/rider/login', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
                },
                body: new URLSearchParams({
                    username,
                    password
                })
            });

            const result = await response.json();

            const success =
                result.success === true ||
                result.code === 200 ||
                result.code === 0;

            if (!success) {
                throw new Error(result.message || '账号或密码错误');
            }

            const rider = result.data || result.user || {};
            localStorage.setItem('takeout_rider_user', JSON.stringify(rider));

            setMessage('登录成功，正在进入骑手首页...', 'success');

            setTimeout(function () {
                location.href = getRedirectTarget();
            }, 450);
        } catch (e) {
            setMessage(e.message || '登录失败，请检查账号和密码', 'error');
        } finally {
            loginSubmitBtn.disabled = false;
        }
    });

    function setMessage(message, type) {
        authMessage.textContent = message || '';
        authMessage.dataset.type = type || 'info';
        authMessage.classList.toggle('hidden', !message);
    }

    function getRedirectTarget() {
        const params = new URLSearchParams(location.search);
        const redirect = params.get('redirect');

        if (redirect && redirect.startsWith('/') && !redirect.startsWith('//') && !redirect.includes('://')) {
            return redirect;
        }

        return '/rider/dashboard.html?v=mt1';
    }
</script>
</body>
</html>
