<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>骑手订单大厅 - 饭点优选</title>
    <link rel="stylesheet" href="/rider/css/rider-app.css">
</head>
<body>

<header class="rider-header compact">
    <div class="rider-inner">
        <div class="rider-top">
            <div class="rider-title">
                <a class="rider-avatar" href="/rider/dashboard.html">‹</a>
                <div>
                    <h1>骑手订单大厅</h1>
                    <p>查看可接订单和我的配送任务</p>
                </div>
            </div>

            <button id="logoutBtn" class="rider-logout-btn">退出登录</button>
        </div>
    </div>
</header>

<main class="rider-shell compact">
    <section class="rider-section-card">
        <div class="rider-section-title">
            <div>
                <h2>配送订单</h2>
                <p>可接订单按催单状态、等待时间和订单金额进行智能排序</p>
            </div>
            <button id="refreshBtn" class="rider-ghost-btn main">刷新</button>
        </div>

        <div id="orderTabs" class="rider-tabs">
            <button class="active" data-type="available">可接订单</button>
            <button data-type="delivering">我的配送</button>
            <button data-type="finished">已完成</button>
        </div>

        <div id="orderList" class="rider-order-list">
            <div class="rider-empty">正在加载订单...</div>
        </div>
    </section>
</main>

<div id="detailMask" class="rider-modal-mask hidden">
    <section class="rider-modal">
        <div class="rider-modal-title">
            <h3>订单详情</h3>
            <button id="closeDetailBtn" class="rider-icon-btn" type="button">×</button>
        </div>

        <div id="detailContent">
            正在加载订单详情...
        </div>
    </section>
</div>

<script src="/rider/js/rider-common.js"></script>
<script src="/rider/js/rider-orders.js"></script>
</body>
</html>
