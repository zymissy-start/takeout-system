<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员登录 - 饭点优选</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 209, 0, 0.25), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(17, 24, 39, 0.12), transparent 30%),
        linear-gradient(135deg, #fffdf5, #f5f7fb);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: #111827;
    }
    .login-card {
      width: min(460px, 100%);
      padding: 30px;
      border-radius: 30px;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 24px 60px rgba(15, 23, 42, .14);
      backdrop-filter: blur(10px);
    }
    .badge {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff3b0;
      color: #5f4700;
      font-weight: 900;
      font-size: 14px;
    }
    h1 { margin: 18px 0 8px; font-size: 32px; }
    p { margin: 0 0 22px; color: #64748b; line-height: 1.7; }
    label { display: block; margin: 14px 0 8px; font-size: 14px; color: #475569; font-weight: 800; }
    input {
      width: 100%;
      height: 46px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    input:focus { border-color: #ffd100; box-shadow: 0 0 0 4px rgba(255, 209, 0, .15); }
    .primary-btn {
      width: 100%;
      height: 48px;
      margin-top: 22px;
      border: none;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }
    .back { display: inline-flex; margin-top: 16px; color: #64748b; text-decoration: none; font-size: 14px; }
    .tip { margin-top: 14px; color: #94a3b8; font-size: 13px; }
    .error { min-height: 22px; margin-top: 12px; color: #dc2626; font-size: 14px; }
    .demo-account {
      margin-top: 18px;
      padding: 16px;
      border-radius: 20px;
      background:
        linear-gradient(#fff, #fff) padding-box,
        linear-gradient(135deg, #ffd100, #111827) border-box;
      border: 1px solid transparent;
    }
    .demo-account p { margin: 0; color: #64748b; font-size: 14px; }
    .demo-account b { color: #111827; font-size: 18px; }
  </style>
</head>
<body>
  <main class="login-card">
    <span class="badge">平台管理员</span>
    <h1>管理员登录</h1>
    <p>登录后进入平台客服中心，统一处理用户工单。</p>
    <label for="username">账号</label>
    <input id="username" value="admin" autocomplete="username" placeholder="请输入管理员账号" />
    <label for="password">密码</label>
    <input id="password" type="password" value="123456" autocomplete="current-password" placeholder="请输入密码" />
    <button id="loginBtn" class="primary-btn" type="button">登录</button>
    <div id="error" class="error"></div>
    <div class="demo-account">
      <p>演示账号：</p>
      <b>admin / 123456</b>
    </div>
    <a class="back" href="/index.html">返回身份选择</a>
  </main>

  <script>
    (function () {
      const username = document.querySelector('#username');
      const password = document.querySelector('#password');
      const error = document.querySelector('#error');
      const btn = document.querySelector('#loginBtn');

      async function login() {
        error.textContent = '';
        const body = { username: username.value.trim(), password: password.value.trim() };
        if (!body.username || !body.password) {
          error.textContent = '请填写账号和密码';
          return;
        }
        btn.disabled = true;
        btn.textContent = '登录中...';
        try {
          const resp = await fetch('/api/admin/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const json = await resp.json();
          if (!resp.ok || !(json.code === 200 || json.code === '200' || json.code === 0 || json.code === '0')) {
            throw new Error(json.message || '登录失败');
          }
          const data = json.data || {};
          localStorage.removeItem('token');
          localStorage.removeItem('Authorization');
          localStorage.removeItem('currentUser');
          localStorage.removeItem('userInfo');
          localStorage.setItem('adminToken', data.adminToken || data.token || '');
          localStorage.setItem('adminUser', JSON.stringify(data.admin || data.user || {}));
          window.location.href = '/admin/customer-service.html';
        } catch (e) {
          error.textContent = e.message || '登录失败';
        } finally {
          btn.disabled = false;
          btn.textContent = '登录';
        }
      }

      btn.addEventListener('click', login);
      password.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    })();
  </script>
</body>
</html>
