<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>平台客服中心 - 管理员</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f6fa;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    .admin-layout { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      background: #111827;
      color: #fff;
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ffd100, #ffb300);
      color: #111827;
      font-size: 22px;
      font-weight: 900;
    }
    .brand h1 { margin: 0; font-size: 20px; }
    .brand p { margin: 3px 0 0; color: #9ca3af; font-size: 12px; }
    .nav-title { margin: 18px 10px 8px; color: #6b7280; font-size: 12px; font-weight: 900; letter-spacing: .08em; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 12px;
      border-radius: 14px;
      color: #d1d5db;
      font-weight: 800;
    }
    .nav-link.active { background: rgba(255, 209, 0, .14); color: #fff; }
    .nav-link:hover { background: rgba(255, 255, 255, .08); }
    .sidebar-footer { position: absolute; left: 18px; right: 18px; bottom: 20px; display: grid; gap: 10px; }
    .admin-user {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, .08);
      color: #e5e7eb;
      line-height: 1.55;
      font-size: 13px;
    }
    .main { min-width: 0; padding: 24px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .topbar h2 { margin: 0; font-size: 28px; }
    .topbar p { margin: 6px 0 0; color: #6b7280; }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #374151;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      text-decoration: none;
    }
    .btn:hover { border-color: #ffd100; box-shadow: 0 8px 20px rgba(15, 23, 42, .08); }
    .btn.primary { border-color: #111827; background: #111827; color: #fff; }
    .btn.warning { border-color: #ffd100; background: #fff7cc; color: #6b4d00; }
    .btn.danger { border-color: #fee2e2; background: #fff1f2; color: #dc2626; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 18px; }
    .stat-card {
      padding: 18px;
      border-radius: 20px;
      background: #fff;
      border: 1px solid #edf0f5;
      box-shadow: 0 10px 26px rgba(15, 23, 42, .05);
    }
    .stat-card span { color: #6b7280; font-size: 13px; font-weight: 800; }
    .stat-card strong { display: block; margin-top: 8px; font-size: 28px; }
    .workspace { display: grid; grid-template-columns: 390px minmax(0, 1fr); gap: 18px; align-items: stretch; }
    .panel {
      min-width: 0;
      background: #fff;
      border: 1px solid #edf0f5;
      border-radius: 22px;
      box-shadow: 0 10px 26px rgba(15, 23, 42, .05);
      overflow: hidden;
    }
    .panel-head { padding: 18px; border-bottom: 1px solid #edf0f5; }
    .panel-head h3 { margin: 0 0 12px; font-size: 18px; }
    .filters { display: grid; grid-template-columns: 128px 1fr; gap: 10px; }
    .input, .select, .textarea {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      color: #111827;
      outline: none;
    }
    .input, .select { height: 40px; padding: 0 12px; }
    .textarea { min-height: 92px; padding: 12px; resize: vertical; line-height: 1.65; }
    .input:focus, .select:focus, .textarea:focus { border-color: #ffd100; box-shadow: 0 0 0 4px rgba(255, 209, 0, .15); }
    .ticket-list { height: calc(100vh - 286px); min-height: 480px; overflow: auto; padding: 12px; display: grid; gap: 10px; align-content: start; background: #fbfcfe; }
    .ticket-card {
      width: 100%;
      display: block;
      text-align: left;
      border: 1px solid #edf0f5;
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }
    .ticket-card:hover { transform: translateY(-1px); border-color: #ffd100; box-shadow: 0 10px 22px rgba(15, 23, 42, .06); }
    .ticket-card.active { border-color: #111827; box-shadow: 0 12px 28px rgba(15, 23, 42, .10); }
    .ticket-card-title { display: flex; justify-content: space-between; gap: 10px; font-weight: 900; line-height: 1.45; }
    .ticket-title-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ticket-meta { margin-top: 8px; color: #6b7280; font-size: 13px; line-height: 1.7; }
    .status-chip { display: inline-flex; align-items: center; justify-content: center; padding: 4px 9px; border-radius: 999px; font-size: 12px; font-weight: 900; background: #f3f4f6; color: #374151; white-space: nowrap; }
    .status-0 { background: #fff7cc; color: #765800; }
    .status-1 { background: #dbeafe; color: #1d4ed8; }
    .status-2 { background: #dcfce7; color: #15803d; }
    .status-3 { background: #e5e7eb; color: #4b5563; }
    .detail-head { padding: 18px; border-bottom: 1px solid #edf0f5; display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
    .detail-head h3 { margin: 0 0 8px; font-size: 20px; }
    .detail-head p { margin: 0; color: #6b7280; line-height: 1.7; }
    .status-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .message-box { height: calc(100vh - 410px); min-height: 380px; overflow: auto; padding: 18px; display: grid; gap: 12px; align-content: start; background: #f8fafc; }
    .message-row { display: flex; }
    .message-row.mine { justify-content: flex-end; }
    .bubble { max-width: min(650px, 78%); padding: 11px 13px; border-radius: 16px 16px 16px 6px; background: #fff; box-shadow: 0 8px 18px rgba(15, 23, 42, .06); line-height: 1.65; word-break: break-word; }
    .message-row.mine .bubble { border-radius: 16px 16px 6px 16px; background: #111827; color: #fff; }
    .bubble-meta { font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
    .message-row.mine .bubble-meta { color: #d1d5db; }
    .reply-panel { padding: 16px; border-top: 1px solid #edf0f5; background: #fff; }
    .reply-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; align-items: center; }
    .reply-actions-left { color: #9ca3af; font-size: 13px; }
    .empty-tip { padding: 34px 16px; text-align: center; color: #9ca3af; }
    .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); padding: 10px 14px; border-radius: 999px; background: #111827; color: #fff; font-size: 14px; box-shadow: 0 12px 28px rgba(15, 23, 42, .20); z-index: 20; }
    .hidden { display: none !important; }
    @media (max-width: 1080px) {
      .admin-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .sidebar-footer { position: static; margin-top: 18px; }
      .workspace { grid-template-columns: 1fr; }
      .ticket-list, .message-box { height: auto; max-height: 560px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 680px) {
      .main { padding: 16px; }
      .topbar, .detail-head { flex-direction: column; }
      .filters, .stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">客</div>
        <div>
          <h1>饭点优选</h1>
          <p>平台管理端</p>
        </div>
      </div>
      <div class="nav-title">工作台</div>
      <a class="nav-link active" href="/admin/customer-service.html">💬 客服工单</a>
      <a class="nav-link" href="/admin/manage.html">👥 用户管理</a>
      <a class="nav-link" href="/admin/contact.html">📨 联系消息</a>
      <a class="nav-link" href="/index.html">🏠 返回首页</a>
      <div class="sidebar-footer">
        <div class="admin-user">
          <b id="adminName">管理员</b><br />
          <span>平台管理控制台</span>
        </div>
        <button id="logoutBtn" class="btn danger" type="button">退出登录</button>
      </div>
    </aside>

    <main class="main">
      <section class="topbar">
        <div>
          <h2>平台客服中心</h2>
          <p>统一查看用户提交的问题，回复并更新处理状态。</p>
        </div>
        <div class="top-actions">
          <button id="refreshTopBtn" class="btn" type="button">刷新</button>
          <a class="btn" href="/index.html">身份入口</a>
        </div>
      </section>

      <section class="stat-grid">
        <div class="stat-card"><span>全部工单</span><strong id="statAll">0</strong></div>
        <div class="stat-card"><span>待处理</span><strong id="statPending">0</strong></div>
        <div class="stat-card"><span>处理中</span><strong id="statProcessing">0</strong></div>
        <div class="stat-card"><span>已解决/关闭</span><strong id="statClosed">0</strong></div>
      </section>

      <section class="workspace">
        <aside class="panel">
          <div class="panel-head">
            <h3>工单列表</h3>
            <div class="filters">
              <select id="statusFilter" class="select">
                <option value="">全部状态</option>
                <option value="0">待处理</option>
                <option value="1">处理中</option>
                <option value="2">已解决</option>
                <option value="3">已关闭</option>
              </select>
              <input id="keywordInput" class="input" placeholder="搜索用户/订单/标题" />
            </div>
          </div>
          <div id="ticketList" class="ticket-list"></div>
        </aside>

        <section class="panel">
          <div class="detail-head">
            <div>
              <h3 id="detailTitle">工单详情</h3>
              <p id="detailSub">选择左侧工单后查看会话。</p>
            </div>
            <div id="statusActions" class="status-actions hidden">
              <button class="btn warning" data-status="1" type="button">标记处理中</button>
              <button class="btn warning" data-status="2" type="button">标记已解决</button>
              <button class="btn" data-status="3" type="button">关闭</button>
            </div>
          </div>
          <div id="messageBox" class="message-box"><div class="empty-tip">请选择一个工单</div></div>
          <div class="reply-panel">
            <textarea id="replyInput" class="textarea" maxlength="2000" placeholder="输入客服回复内容"></textarea>
            <div class="reply-actions">
              <span class="reply-actions-left">发送后用户可在客服中心查看。</span>
              <div>
                <button id="refreshBtn" class="btn" type="button">刷新会话</button>
                <button id="sendReplyBtn" class="btn primary" type="button">发送回复</button>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
    (function () {
      const $ = selector => document.querySelector(selector);
      let tickets = [];
      let currentTicketId = null;
      const statusText = ['待处理', '处理中', '已解决', '已关闭'];

      function getAdminToken() {
        return localStorage.getItem('adminToken') || '';
      }

      function initAdminName() {
        try {
          const admin = JSON.parse(localStorage.getItem('adminUser') || '{}');
          $('#adminName').textContent = admin.realName || admin.real_name || admin.username || '管理员';
        } catch (e) {
          $('#adminName').textContent = '管理员';
        }
      }

      function toast(message) {
        const el = $('#toast');
        el.textContent = message;
        el.classList.remove('hidden');
        clearTimeout(window.__adminToastTimer);
        window.__adminToastTimer = setTimeout(() => el.classList.add('hidden'), 2200);
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>'"]/g, s => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[s]));
      }

      function formatTime(value) {
        if (!value) return '';
        return String(value).replace('T', ' ').slice(0, 16);
      }

      function statusChip(status) {
        const s = Number(status || 0);
        return `<span class="status-chip status-${s}">${statusText[s] || '未知'}</span>`;
      }

      async function request(url, options) {
        const token = getAdminToken();
        if (!token) {
          window.location.href = '/admin/login.html';
          throw new Error('请先登录管理员账号');
        }
        const opt = Object.assign({ method: 'GET' }, options || {});
        opt.headers = Object.assign({ 'Content-Type': 'application/json' }, opt.headers || {});
        opt.headers.Authorization = token.startsWith('Bearer ') ? token : `Bearer ${token}`;
        if (opt.body && typeof opt.body !== 'string') opt.body = JSON.stringify(opt.body);
        const resp = await fetch(url, opt);
        const text = await resp.text();
        let json = {};
        try { json = text ? JSON.parse(text) : {}; } catch (e) { json = {}; }
        if (resp.status === 401 || resp.status === 403) {
          clearAdminStorage();
          window.location.href = '/admin/login.html';
          throw new Error('登录已失效');
        }
        if (!resp.ok || ![0, 200, '0', '200'].includes(json.code)) {
          throw new Error(json.message || '请求失败');
        }
        return json.data;
      }

      function clearAdminStorage() {
        localStorage.removeItem('adminToken');
        localStorage.removeItem('adminUser');
      }

      function renderStats() {
        $('#statAll').textContent = tickets.length;
        $('#statPending').textContent = tickets.filter(t => Number(t.status) === 0).length;
        $('#statProcessing').textContent = tickets.filter(t => Number(t.status) === 1).length;
        $('#statClosed').textContent = tickets.filter(t => [2, 3].includes(Number(t.status))).length;
      }

      async function loadTickets() {
        const status = $('#statusFilter').value;
        const keyword = $('#keywordInput').value.trim();
        const params = new URLSearchParams();
        if (status) params.set('status', status);
        if (keyword) params.set('keyword', keyword);
        const qs = params.toString();
        tickets = await request('/api/admin/customer-service/tickets' + (qs ? '?' + qs : ''));
        tickets = Array.isArray(tickets) ? tickets : [];
        renderStats();
        renderTickets();
      }

      function renderTickets() {
        const box = $('#ticketList');
        if (!tickets.length) {
          box.innerHTML = '<div class="empty-tip">暂无工单</div>';
          return;
        }
        box.innerHTML = tickets.map(t => `
          <button class="ticket-card ${t.ticketId === currentTicketId ? 'active' : ''}" data-ticket-id="${t.ticketId}">
            <div class="ticket-card-title"><span class="ticket-title-text">#${t.ticketId} ${escapeHtml(t.title)}</span>${statusChip(t.status)}</div>
            <div class="ticket-meta">
              用户：${escapeHtml(t.userName || '')}${t.userPhone ? ' / ' + escapeHtml(t.userPhone) : ''}<br>
              ${t.orderId ? '订单 #' + t.orderId + ' · ' : ''}${t.merchantName ? escapeHtml(t.merchantName) + ' · ' : ''}${escapeHtml(t.type || '')}<br>
              ${formatTime(t.updateTime)} · ${escapeHtml(t.lastMessage || '暂无消息')}
            </div>
          </button>
        `).join('');
        box.querySelectorAll('.ticket-card').forEach(btn => {
          btn.addEventListener('click', () => openTicket(Number(btn.dataset.ticketId)));
        });
      }

      async function openTicket(ticketId) {
        currentTicketId = ticketId;
        renderTickets();
        const detail = await request(`/api/admin/customer-service/tickets/${ticketId}`);
        const ticket = detail.ticket || {};
        const messages = detail.messages || [];
        $('#detailTitle').textContent = `#${ticket.ticketId || ticketId} ${ticket.title || '工单详情'}`;
        $('#detailSub').textContent = `${statusText[ticket.status] || '未知状态'} · 用户：${ticket.userName || ''}${ticket.orderId ? ' · 订单 #' + ticket.orderId : ''}${ticket.merchantName ? ' · 商家：' + ticket.merchantName : ''}`;
        $('#statusActions').classList.remove('hidden');
        $('#replyInput').disabled = Number(ticket.status) === 3;
        $('#sendReplyBtn').disabled = Number(ticket.status) === 3;
        $('#messageBox').innerHTML = messages.length ? messages.map(m => {
          const mine = Number(m.senderRole) === 4;
          return `<div class="message-row ${mine ? 'mine' : ''}"><div class="bubble"><div class="bubble-meta">${mine ? '平台客服' : escapeHtml(m.senderName || '用户')} · ${formatTime(m.createTime)}</div>${escapeHtml(m.content)}</div></div>`;
        }).join('') : '<div class="empty-tip">暂无消息</div>';
        $('#messageBox').scrollTop = $('#messageBox').scrollHeight;
      }

      async function sendReply() {
        if (!currentTicketId) return toast('请先选择工单');
        const content = $('#replyInput').value.trim();
        if (!content) return toast('请输入回复内容');
        await request(`/api/admin/customer-service/tickets/${currentTicketId}/messages`, { method: 'POST', body: { content } });
        $('#replyInput').value = '';
        toast('回复成功');
        await openTicket(currentTicketId);
        await loadTickets();
      }

      async function updateStatus(status) {
        if (!currentTicketId) return toast('请先选择工单');
        await request(`/api/admin/customer-service/tickets/${currentTicketId}/status`, { method: 'PUT', body: { status } });
        toast('状态已更新');
        await openTicket(currentTicketId);
        await loadTickets();
      }

      async function logout() {
        try {
          await fetch('/api/admin/auth/logout', { method: 'POST' });
        } catch (e) {}
        clearAdminStorage();
        window.location.href = '/index.html';
      }

      $('#sendReplyBtn').addEventListener('click', sendReply);
      $('#refreshBtn').addEventListener('click', () => currentTicketId ? openTicket(currentTicketId) : loadTickets());
      $('#refreshTopBtn').addEventListener('click', loadTickets);
      $('#statusFilter').addEventListener('change', () => { currentTicketId = null; loadTickets(); });
      $('#keywordInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadTickets(); });
      $('#logoutBtn').addEventListener('click', logout);
      document.querySelectorAll('#statusActions [data-status]').forEach(btn => {
        btn.addEventListener('click', () => updateStatus(Number(btn.dataset.status)));
      });

      initAdminName();
      loadTickets().catch(e => toast(e.message || '加载失败'));
    })();
  </script>
</body>
</html>
